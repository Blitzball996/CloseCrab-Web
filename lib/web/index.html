<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CloseCrab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Sessions View -->
    <div id="view-sessions">
      <div class="nav-bar">
        <h1>CloseCrab</h1>
        <div id="server-status" class="badge badge-offline">Offline</div>
      </div>
      <div id="sessions-list" class="content sessions-content"></div>
      <div class="bottom-bar">
        <button class="btn-primary" onclick="showNewSession()">New Session</button>
      </div>
    </div>

    <!-- New Session View -->
    <div id="view-new" style="display:none;">
      <div class="nav-bar">
        <button class="btn-back" onclick="showView('sessions')">&larr;</button>
        <h1>New Session</h1>
      </div>
      <div class="content form-content new-session-content">
        <div class="logo-watermark" aria-hidden="true"></div>
        <label>Working Directory <span class="hint">(optional)</span></label>
        <input type="text" id="input-dir" placeholder="Leave empty for default" autocomplete="off">
        <p class="hint-text">CloseCrab will use the config already set up on this PC.</p>
        <button class="btn-primary" onclick="doCreateSession()">Start</button>
      </div>
    </div>

    <!-- Terminal View -->
    <div id="view-terminal" style="display:none;">
      <div class="nav-bar">
        <button class="btn-back" onclick="leaveTerminal()">&larr;</button>
        <div class="nav-center">
          <span id="term-title">CloseCrab</span>
          <div id="term-status" class="badge badge-connecting">Connecting</div>
        </div>
        <button class="btn-icon btn-danger" onclick="killSession()" title="Kill">&#x2715;</button>
      </div>

      <!-- Loading with random mini-game -->
      <div id="loading-screen">
        <div id="loading-status">Launching CloseCrab...</div>
        <canvas id="game-canvas"></canvas>
        <p class="game-hint" id="game-hint">Loading game...</p>
        <div id="game-controls"></div>
        <button id="btn-enter" class="btn-primary" style="display:none;" onclick="enterTerminal()">Enter Terminal &rarr;</button>
      </div>

      <!-- Terminal output -->
      <div id="terminal-area" style="display:none;">
        <div id="term-output"></div>
        <div id="thinking-bar" style="display:none;">
          <div class="wave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <span id="thinking-label">Thinking</span>
        </div>
        <div id="quick-bar">
          <button onclick="sendKey('\x03')">^C</button>
          <button onclick="sendKey('\t')">Tab</button>
          <button onclick="sendKey('\x1b')">Esc</button>
          <button onclick="sendKey('\x1a')">^Z</button>
          <button onclick="sendKey('/help\r')">/help</button>
          <button onclick="sendKey('y\r')">Yes</button>
        </div>
        <div id="input-bar">
          <input type="text" id="msg-input" placeholder="Type here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <button id="btn-send" onclick="sendMessage()">&#x2191;</button>
        </div>
      </div>
    </div>
  </div>
  <script src="games.js"></script>
  <script src="app.js"></script>
</body>
</html>
